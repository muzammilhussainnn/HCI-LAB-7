<!DOCTYPE html>
<html>
<head>
  <title>6DoF Lab</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #f0f4f8; }
    #ui { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10; }
  </style>
</head>
<body>

<div id="ui">
  <h1>6 Degrees of Freedom</h1>
  <p>Move: Arrows/f/s/a/d | Rotate: x/y/z (Shift to reverse)</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> 
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// Deep Purple Cube
const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2); 
const material = new THREE.MeshStandardMaterial({ color: 0x4B0082, roughness: 0.3 }); 
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

window.addEventListener('keydown', (e) => {
  const s = 0.1; 
  // Rotation
  if (e.key === 'x') cube.rotation.x += s; if (e.key === 'X') cube.rotation.x -= s;
  if (e.key === 'y') cube.rotation.y += s; if (e.key === 'Y') cube.rotation.y -= s;
  if (e.key === 'z') cube.rotation.z += s; if (e.key === 'Z') cube.rotation.z -= s;
  // Translation
  if (e.key === 'ArrowUp' || e.key === 'f') cube.position.y += s;
  if (e.key === 'ArrowDown' || e.key === 's') cube.position.y -= s;
  if (e.key === 'ArrowLeft') cube.position.x -= s;
  if (e.key === 'ArrowRight') cube.position.x += s;
  if (e.key === 'a') cube.position.z += s;
  if (e.key === 'd') cube.position.z -= s;
});

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
